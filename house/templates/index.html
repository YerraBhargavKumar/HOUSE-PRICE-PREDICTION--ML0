<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #1d2671, #c33764);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #2c2f4a;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #00c853;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00b248;
        }

        .result {
            margin-top: 15px;
            padding: 12px;
            background: #444;
            border-radius: 8px;
            font-size: 18px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🏠 House Price Predictor</h2>

    <form action="/predict" method="post">
        <input type="number" name="area" placeholder="Area (sq ft)" required>
        <input type="number" name="bedrooms" placeholder="Bedrooms" required>
        <input type="number" name="bathrooms" placeholder="Bathrooms" required>

        <button type="submit">Predict Price</button>
    </form>

    {% if result %}
        <div class="result">
            💰 Estimated Price: ₹ {{ result }}
        </div>
    {% endif %}

    <div class="footer">
        Built using ML + Flask
    </div>
</div>

</body>
</html>
